name: build-and-publish

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and upload"
        required: true

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BRIDGE_OWNER: ${{ github.repository_owner }}
  BRIDGE_VERSION: ${{ vars.BRIDGE_VERSION || '' }}
  BRIDGE_PACKAGES_USERNAME: ${{ vars.BRIDGE_PACKAGES_USERNAME || github.actor }}
  BRIDGE_PACKAGES_TOKEN: ${{ secrets.BRIDGE_PACKAGES_TOKEN || github.token }}

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Verify no placeholder versions
        run: |
          if rg --fixed-strings -- '-PLACEHOLDER' pom.xml; then
            echo "Found placeholder versions. Please replace -PLACEHOLDER before building."
            exit 1
          fi

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: bridge-github
          server-username: BRIDGE_PACKAGES_USERNAME
          server-password: BRIDGE_PACKAGES_TOKEN

      - name: Derive version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="0.1.0-SNAPSHOT.${GITHUB_RUN_NUMBER}"
          fi
          echo "VALUE=$VER" >> "$GITHUB_OUTPUT"

      - name: Set project version
        run: mvn -B -q org.codehaus.mojo:versions-maven-plugin:2.16.2:set -DnewVersion=${{ steps.version.outputs.VALUE }} -DgenerateBackupPoms=false

      - name: Resolve Bridge version from GitHub Packages
        if: env.BRIDGE_VERSION == ''
        env:
          BRIDGE_OWNER: ${{ env.BRIDGE_OWNER }}
          GITHUB_TOKEN: ${{ env.BRIDGE_PACKAGES_TOKEN }}
        run: |
          echo "Resolving Bridge version for owner ${BRIDGE_OWNER}"
          VERSION="$(./scripts/resolve-bridge-version.sh)"
          echo "Using Bridge ${VERSION}"
          echo "BRIDGE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build
        run: |
          if [[ -n "${BRIDGE_VERSION:-}" ]]; then
            mvn -B verify -Dbridge.owner=${BRIDGE_OWNER} -Dbridge.version=${BRIDGE_VERSION}
          else
            mvn -B verify -Dbridge.owner=${BRIDGE_OWNER}
          fi

      - name: Upload jar
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: VanillaCord
          path: artifacts/VanillaCord.jar
          if-no-files-found: error

  release:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: vars
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [[ -z "${TAG}" ]]; then
            echo "Tag is required."
            exit 1
          fi
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ steps.vars.outputs.TAG }}

      - name: Verify no placeholder versions
        run: |
          if rg --fixed-strings -- '-PLACEHOLDER' pom.xml; then
            echo "Found placeholder versions. Please replace -PLACEHOLDER before building."
            exit 1
          fi

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: bridge-github
          server-username: BRIDGE_PACKAGES_USERNAME
          server-password: BRIDGE_PACKAGES_TOKEN

      - name: Derive version
        id: version
        run: |
          VER="${{ steps.vars.outputs.TAG }}"
          VER="${VER#v}"
          echo "VALUE=$VER" >> "$GITHUB_OUTPUT"

      - name: Set project version
        run: mvn -B -q org.codehaus.mojo:versions-maven-plugin:2.16.2:set -DnewVersion=${{ steps.version.outputs.VALUE }} -DgenerateBackupPoms=false

      - name: Resolve Bridge version from GitHub Packages
        if: env.BRIDGE_VERSION == ''
        env:
          BRIDGE_OWNER: ${{ env.BRIDGE_OWNER }}
          GITHUB_TOKEN: ${{ env.BRIDGE_PACKAGES_TOKEN }}
        run: |
          echo "Resolving Bridge version for owner ${BRIDGE_OWNER}"
          VERSION="$(./scripts/resolve-bridge-version.sh)"
          echo "Using Bridge ${VERSION}"
          echo "BRIDGE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build
        run: |
          if [[ -n "${BRIDGE_VERSION:-}" ]]; then
            mvn -B verify -Dbridge.owner=${BRIDGE_OWNER} -Dbridge.version=${BRIDGE_VERSION}
          else
            mvn -B verify -Dbridge.owner=${BRIDGE_OWNER}
          fi

      - name: Publish release asset
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d
        with:
          tag_name: ${{ steps.vars.outputs.TAG }}
          files: artifacts/VanillaCord.jar
          fail_on_unmatched_files: true
