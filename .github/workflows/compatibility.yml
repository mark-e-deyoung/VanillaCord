name: minecraft-compatibility

on:
  workflow_dispatch:
    inputs:
      include_snapshot:
        description: "Include latest Mojang snapshot/RC"
        required: false
        default: "true"
      required_supported:
        description: "Space-separated required supported Minecraft versions"
        required: false
        default: "1.21.11 1.20.6 1.20.4 1.19.4 1.18.2"
      best_effort_legacy:
        description: "Space-separated best-effort legacy Minecraft versions"
        required: false
        default: "1.17.1 1.16.5 1.12.2 1.8.9 1.7.10"

env:
  BRIDGE_OWNER: ${{ github.repository_owner }}
  BRIDGE_VERSION: ${{ vars.BRIDGE_VERSION || '' }}
  BRIDGE_PACKAGES_USERNAME: ${{ vars.BRIDGE_PACKAGES_USERNAME || github.actor }}
  BRIDGE_PACKAGES_TOKEN: ${{ secrets.BRIDGE_PACKAGES_TOKEN || github.token }}
  VANILLACORD_INCLUDE_SNAPSHOT: ${{ inputs.include_snapshot || 'true' }}
  VANILLACORD_REQUIRED_SUPPORTED: ${{ inputs.required_supported || '1.21.11 1.20.6 1.20.4 1.19.4 1.18.2' }}
  VANILLACORD_BEST_EFFORT_LEGACY: ${{ inputs.best_effort_legacy || '1.17.1 1.16.5 1.12.2 1.8.9 1.7.10' }}
  VANILLACORD_COMPAT_REPORT: docs/minecraft-compatibility-report.md

permissions:
  contents: read
  packages: read

jobs:
  compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: 25
          cache: maven
          server-id: bridge-github
          server-username: BRIDGE_PACKAGES_USERNAME
          server-password: BRIDGE_PACKAGES_TOKEN

      - name: Resolve Bridge version from GitHub Packages
        if: env.BRIDGE_VERSION == ''
        env:
          BRIDGE_OWNER: ${{ env.BRIDGE_OWNER }}
          GITHUB_TOKEN: ${{ env.BRIDGE_PACKAGES_TOKEN }}
        run: |
          VERSION="$(bash ./scripts/resolve-bridge-version.sh)"
          echo "Using Bridge ${VERSION}"
          echo "BRIDGE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build VanillaCord
        run: |
          if [[ -n "${BRIDGE_VERSION:-}" ]]; then
            mvn -B verify -Dbridge.owner=${BRIDGE_OWNER} -Dbridge.version=${BRIDGE_VERSION}
          else
            mvn -B verify -Dbridge.owner=${BRIDGE_OWNER}
          fi

      - name: Run Minecraft compatibility probe
        run: bash ./scripts/check-minecraft-compatibility.sh artifacts/VanillaCord.jar

      - name: Add report to job summary
        if: always()
        run: |
          if [[ -f "$VANILLACORD_COMPAT_REPORT" ]]; then
            cat "$VANILLACORD_COMPAT_REPORT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No compatibility report was generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload compatibility report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: minecraft-compatibility-report
          path: ${{ env.VANILLACORD_COMPAT_REPORT }}
          if-no-files-found: warn
