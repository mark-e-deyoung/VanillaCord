name: Approved PRs Only

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write
  contents: read

env:
  UNAPPROVED_LABEL: unapproved
  UNAPPROVED_PR_COMMENT: "This repository is invite-only. Pull requests from unapproved actors or forks are automatically closed."
  APPROVED_ACTORS_FILE: .github/approved-actors.yml

jobs:
  enforce-approved-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce invite-only PR participation
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const opener = context.payload.pull_request.user.login;
            const fromFork = context.payload.pull_request.head.repo.full_name !== `${owner}/${repo}`;
            const label = process.env.UNAPPROVED_LABEL;
            const comment = process.env.UNAPPROVED_PR_COMMENT;
            const whitelistPath = process.env.APPROVED_ACTORS_FILE;

            async function loadWhitelist() {
              try {
                const { data } = await github.request(
                  "GET /repos/{owner}/{repo}/contents/{path}",
                  { owner, repo, path: whitelistPath }
                );
                if (!data?.content) return new Set();
                const text = Buffer.from(data.content, "base64").toString("utf8");
                const users = [];
                let inUsers = false;
                for (const raw of text.split(/\r?\n/)) {
                  const line = raw.trim();
                  if (!line || line.startsWith("#")) continue;
                  if (line === "users:" || line.startsWith("users:")) {
                    inUsers = true;
                    continue;
                  }
                  if (inUsers && line.startsWith("- ")) {
                    users.push(line.slice(2).trim());
                  }
                }
                return new Set(users.map(u => u.toLowerCase()));
              } catch (e) {
                console.warn("Could not load whitelist:", e.message);
                return new Set();
              }
            }

            const whitelist = await loadWhitelist();
            const isApproved = whitelist.has(opener.toLowerCase());
            console.log("Whitelist:", [...whitelist]);
            console.log("Opener:", opener.toLowerCase(), "Approved:", isApproved, "FromFork:", fromFork);

            if (isApproved && !fromFork) {
              console.log("Approved actor, same repo — allowing");
              return;
            }

            const reason = !isApproved ? "unapproved actor" : "fork PR";
            console.log(`Closing PR from ${reason}`);
            await github.rest.issues.addLabels({
              owner, repo, issue_number: pull_number, labels: [label]
            });
            await github.rest.issues.createComment({
              owner, repo, issue_number: pull_number, body: comment
            });
            await github.rest.pulls.update({
              owner, repo, pull_number, state: "closed"
            });
